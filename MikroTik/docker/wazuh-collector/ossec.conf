<ossec_config>
  <client>
    <server>
      <address>WAZUH_MANAGER_IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <enrollment>
      <enabled>yes</enabled>
      <groups>server-A</groups>
      <agent_name>Collector_server_A</agent_name>
    </enrollment>
  </client>

  <logging>
    <log_format>plain</log_format>
    <log_location>/var/ossec/logs/ossec.log</log_location>
    <only-allow-new-log>no</only-allow-new-log>
  </logging>
</ossec_config>
