  <agent_config>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/filter/latest.log</location>
    </localfile>
    <localfile>
      <log_format>json</log_format>
      <location>/var/log/suricata/eve.json</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/auth/latest.log</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/system/latest.log</location>
    </localfile>
    <syscheck>
      <frequency>43200</frequency>
      <directories check_all="yes" realtime="yes">/conf</directories>
      <ignore>/conf/backup</ignore>
      <ignore>/tmp</ignore>
      <ignore>/var/run</ignore>
      <ignore>/var/log</ignore>
    </syscheck>
  </agent_config>
